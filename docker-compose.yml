version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: atomquest
      POSTGRES_PASSWORD: password123
      POSTGRES_DB: atomquest_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U atomquest -d atomquest_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://atomquest:password123@db:5432/atomquest_db?schema=public
      - JWT_SECRET=hackathon-super-secret-key
      - PORT=4000
    depends_on:
      db:
        condition: service_healthy

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://localhost:4000
      - AUTH_SECRET=hackathon-auth-super-secret-12345
    depends_on:
      - api

volumes:
  pgdata:
